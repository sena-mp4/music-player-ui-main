<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player de Música</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importando ícones do Font Awesome para os botões -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="music-player">
        <!-- Área da Capa e Informações da Música -->
        <div class="song-info">
            <img src="https://via.placeholder.com/150" alt="Capa do Álbum" id="cover">
            <h2 id="title">Título da Música</h2>
            <p id="artist">Nome do Artista</p>
        </div>

        <!-- Área dos Controles de Reprodução -->
        <div class="controls">
            <button id="prev" title="Anterior"><i class="fas fa-backward"></i></button>
            <button id="play" title="Reproduzir"><i class="fas fa-play"></i></button>
            <button id="next" title="Próximo"><i class="fas fa-forward"></i></button>
        </div>

        <!-- Barra de Progresso da Música -->
        <div class="progress-container">
            <span id="current-time">00:00</span>
            <input type="range" id="progress" value="0" min="0" max="100">
            <span id="duration">00:00</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
