<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Botão de menu para mobile -->
    <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-container">
        <!-- Menu Lateral -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-music"></i>
                    <h2>Music Player</h2>
                </div>
                <button class="menu-close" id="menu-close" aria-label="Fechar menu">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item active">
                    <a href="#"><i class="fas fa-home"></i> <span>Início</span></a>
                </li>
                <li class="nav-item">
                    <a href="#"><i class="fas fa-fire"></i> <span>Em Alta</span></a>
                </li>
                <li class="nav-item">
                    <a href="#"><i class="fas fa-compass"></i> <span>Explorar</span></a>
                </li>
                <li class="nav-item">
                    <a href="#"><i class="fas fa-bookmark"></i> <span>Sua Biblioteca</span></a>
                </li>
            </ul>

            <div class="playlist-section">
                <h3>Suas Playlists</h3>
                <ul>
                    <li><a href="#">🎵 Favoritas</a></li>
                    <li><a href="#">🔥 Hits do Momento</a></li>
                    <li><a href="#">😌 Relax</a></li>
                    <li><a href="#">💪 Treino</a></li>
                </ul>
            </div>
        </nav>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- Barra de Busca -->
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="O que você quer ouvir?">
                <button id="search-button">Buscar</button>
            </div>

            <!-- Seção Em Alta -->
            <section class="section">
                <h2 class="section-title">Em Alta agora</h2>
                <div class="card-grid" id="trending-grid"></div>
            </section>

            <!-- Seção Playlists Recomendadas -->
            <section class="section">
                <h2 class="section-title">Playlists Recomendadas</h2>
                <div class="card-grid" id="playlists-grid"></div>
            </section>

            <!-- Seção Categorias -->
            <section class="section">
                <h2 class="section-title">Explore Categorias</h2>
                <div class="categories-grid" id="categories-grid"></div>
            </section>

            <!-- Resultados da Busca -->
            <div id="search-results" class="search-results-grid" style="display:none;"></div>
        </main>
    </div>

    <!-- Player Fixo no Rodapé -->
    <div class="player-bar" id="player-bar">
        <div class="player-left">
            <img id="player-cover" src="https://via.placeholder.com/50" alt="Capa">
            <div class="player-info">
                <span id="player-title">Nenhuma música</span>
                <span id="player-artist">Selecione algo para tocar</span>
            </div>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <button id="prev-btn"><i class="fas fa-backward"></i></button>
                <button id="play-btn"><i class="fas fa-play"></i></button>
                <button id="next-btn"><i class="fas fa-forward"></i></button>
            </div>
            <div class="progress-container">
                <span id="current-time">00:00</span>
                <input type="range" id="progress-bar" value="0" min="0" max="100">
                <span id="duration-time">00:00</span>
            </div>
        </div>
        <div class="player-right">
            <button id="volume-btn"><i class="fas fa-volume-up"></i></button>
            <input type="range" id="volume-bar" value="70" min="0" max="100">
        </div>
    </div>

    <!-- Player invisível do YouTube -->
    <div id="youtube-audio-player"></div>

    <script src="script.js"></script>
</body>
</html>
