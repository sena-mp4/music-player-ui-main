<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player de Música</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importando ícones do Font Awesome para os botões -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Menu Lateral (Sidebar) -->
    <nav class="sidebar">
        <h2>Meu Music Player</h2>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Em Alta</a></li>
            <li><a href="#">Gêneros</a></li>
            <li><a href="#">Suas Músicas</a></li>
            <li><a href="#">Artistas</a></li>
        </ul>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="main-content">
        <!-- Barra de Busca -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="O que você quer ouvir?">
            <button id="search-button"><i class="fas fa-search"></i> Buscar</button>
        </div>

        <!-- Grade de Categorias/Gêneros -->
        <h1>Explore as Categorias</h1>
        <div class="categories-grid">
            <div class="category-item" data-genre="pop"><img src="https://via.placeholder.com/40/FF0000/FFFFFF?text=Pop" alt="Pop"> Pop</div>
            <div class="category-item" data-genre="mpb"><img src="https://via.placeholder.com/40/00FF00/FFFFFF?text=MPB" alt="MPB"> MPB</div>
            <div class="category-item" data-genre="rock"><img src="https://via.placeholder.com/40/0000FF/FFFFFF?text=Rock" alt="Rock"> Rock</div>
            <div class="category-item" data-genre="eletronica"><img src="https://via.placeholder.com/40/FFFF00/FFFFFF?text=Eletronica" alt="Eletrônica"> Eletrônica</div>
            <div class="category-item" data-genre="sertanejo"><img src="https://via.placeholder.com/40/FF00FF/FFFFFF?text=Sertanejo" alt="Sertanejo"> Sertanejo</div>
            <!-- Adicione quantas categorias quiser! -->
        </div>

        <!-- Aqui vai a sua div "music-player" original -->
        <div class="music-player">
            <!-- (todo o código do seu player, que deixei acima) -->
        </div>
    </div>

    <!-- No final do body, o JavaScript para dar vida aos botões de busca e categorias -->
    <script>
        const searchButton = document.getElementById('search-button');
        const searchInput = document.getElementById('search-input');
        const categoryItems = document.querySelectorAll('.category-item');

        // Busca ao clicar no botão ou pressionar Enter
        searchButton.addEventListener('click', () => searchAndPlayMusic(searchInput.value));
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchAndPlayMusic(searchInput.value);
        });

        // Busca ao clicar em uma categoria
        categoryItems.forEach(item => {
            item.addEventListener('click', function() {
                const genre = this.dataset.genre;
                const randomArtists = {
                    pop: "Billie Eilish", mpb: "Caetano Veloso", rock: "Foo Fighters",
                    eletronica: "Alok", sertanejo: "Jorge e Mateus"
                };
                searchAndPlayMusic(randomArtists[genre] || genre);
            });
        });
    </script>
</body>
</html>
